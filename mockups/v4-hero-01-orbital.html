<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Concept 01 - Orbital Portrait</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #ffffff;
        --ink: #0f172a;
        --ink-soft: #334155;
        --muted: #64748b;
        --rule: #e6eaf0;
        --blue: #2563eb;
        --blue-deep: #1d4ed8;
        --amber: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 12% 18%, rgba(37, 99, 235, 0.1), transparent 26rem),
          radial-gradient(circle at 86% 72%, rgba(245, 158, 11, 0.12), transparent 24rem), var(--bg);
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(320px, 0.8fr);
        gap: clamp(3rem, 7vw, 6rem);
        align-items: center;
        width: min(1120px, calc(100% - 48px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 72px 0;
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 18px;
        color: var(--blue);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .kicker::before {
        width: 28px;
        height: 1px;
        content: "";
        background: var(--blue);
      }

      h1 {
        max-width: 11ch;
        margin: 0 0 24px;
        font-size: clamp(48px, 7vw, 86px);
        font-weight: 750;
        letter-spacing: -0.055em;
        line-height: 0.98;
      }

      h1 span {
        color: transparent;
        background: linear-gradient(135deg, var(--blue), #6366f1 48%, var(--amber));
        -webkit-background-clip: text;
        background-clip: text;
      }

      .lede {
        max-width: 58ch;
        margin: 0 0 30px;
        color: var(--ink-soft);
        font-size: 18px;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border: 1px solid var(--rule);
        border-radius: 12px;
        color: var(--ink);
        font-weight: 600;
        text-decoration: none;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 12px 30px -24px rgba(15, 23, 42, 0.4);
      }

      .btn.primary {
        color: #fff;
        border-color: var(--blue);
        background: var(--blue);
      }

      .portrait {
        position: relative;
        justify-self: center;
        width: min(380px, 78vw);
        aspect-ratio: 1;
      }

      .ring {
        position: absolute;
        border: 1px dashed rgba(37, 99, 235, 0.28);
        border-radius: 50%;
        animation: rotate 34s linear infinite;
      }

      .ring.one {
        inset: 0;
      }

      .ring.two {
        inset: -26px;
        border-color: rgba(37, 99, 235, 0.16);
        animation-duration: 60s;
        animation-direction: reverse;
      }

      .ring.three {
        inset: 44px;
        border-style: solid;
        border-color: rgba(245, 158, 11, 0.18);
        animation-duration: 44s;
      }

      .node {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 0 8px rgba(37, 99, 235, 0.09);
      }

      .node.a {
        top: 10%;
        right: 13%;
      }

      .node.b {
        bottom: 17%;
        left: 3%;
        background: var(--amber);
        box-shadow: 0 0 0 8px rgba(245, 158, 11, 0.12);
      }

      .photo {
        position: absolute;
        inset: 32px;
        overflow: hidden;
        border: 1px solid rgba(37, 99, 235, 0.18);
        border-radius: 50%;
        background: #020617;
        box-shadow:
          0 34px 90px -42px rgba(15, 23, 42, 0.7),
          0 0 0 12px rgba(37, 99, 235, 0.05);
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
        display: block;
      }

      .badge {
        position: absolute;
        right: 8px;
        top: 64px;
        padding: 8px 13px;
        border: 1px solid rgba(148, 163, 184, 0.4);
        border-radius: 999px;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 28px -22px rgba(15, 23, 42, 0.5);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 860px) {
        .hero {
          grid-template-columns: 1fr;
          text-align: center;
        }

        h1,
        .lede {
          margin-left: auto;
          margin-right: auto;
        }

        .kicker,
        .actions {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero" aria-labelledby="hero-heading">
      <div>
        <div class="kicker">ML Researcher - Applied AI</div>
        <h1 id="hero-heading">Building AI that <span>quietly works.</span></h1>
        <p class="lede">
          ML Researcher II at Captura, working across computer vision, foundation models, and practical AI systems for
          imaging products.
        </p>
        <div class="actions">
          <a class="btn primary" href="/research">View Research</a>
          <a class="btn" href="/posts/">Read Notes</a>
          <a class="btn" href="mailto:m.molahasani.m@gmail.com">Get in Touch</a>
        </div>
      </div>

      <div class="portrait" aria-label="Profile portrait concept">
        <div class="ring one"></div>
        <div class="ring two"></div>
        <div class="ring three"></div>
        <span class="node a"></span>
        <span class="node b"></span>
        <div class="photo">
          <img src="../images/profile.png" alt="Mahdiyar Molahasani" />
        </div>
        <div class="badge">Vancouver, BC</div>
      </div>
    </section>
  </body>
</html>
