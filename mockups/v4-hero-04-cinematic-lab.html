<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Concept 04 - Cinematic Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #f8fafc;
        --ink-2: #cbd5e1;
        --muted: #94a3b8;
        --rule: rgba(148, 163, 184, 0.22);
        --blue: #60a5fa;
        --blue-strong: #2563eb;
        --amber: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family:
          Inter,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at 72% 42%, rgba(37, 99, 235, 0.42), transparent 26rem),
          radial-gradient(circle at 42% 82%, rgba(245, 158, 11, 0.18), transparent 24rem),
          linear-gradient(135deg, #020617, #0f172a 48%, #111827);
      }

      .hero {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, 0.95fr);
        gap: clamp(3rem, 7vw, 6rem);
        align-items: center;
        width: min(1160px, calc(100% - 48px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 72px 0;
      }

      .hero::before {
        position: absolute;
        inset: 54px auto 54px 50%;
        width: 1px;
        content: "";
        background: linear-gradient(transparent, rgba(96, 165, 250, 0.42), transparent);
      }

      .kicker {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 18px;
        color: var(--blue);
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .kicker::before {
        width: 28px;
        height: 1px;
        content: "";
        background: var(--blue);
      }

      h1 {
        max-width: 12ch;
        margin: 0 0 24px;
        font-size: clamp(48px, 7vw, 86px);
        font-weight: 780;
        letter-spacing: -0.058em;
        line-height: 0.98;
      }

      h1 span {
        color: transparent;
        background: linear-gradient(135deg, #f8fafc 5%, var(--blue) 52%, var(--amber));
        -webkit-background-clip: text;
        background-clip: text;
      }

      .lede {
        max-width: 58ch;
        margin: 0 0 30px;
        color: var(--ink-2);
        font-size: 18px;
        line-height: 1.75;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .btn {
        padding: 11px 18px;
        border: 1px solid var(--rule);
        border-radius: 12px;
        color: var(--ink);
        font-weight: 600;
        text-decoration: none;
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(14px);
      }

      .btn.primary {
        border-color: var(--blue-strong);
        background: var(--blue-strong);
        box-shadow: 0 18px 34px -24px rgba(96, 165, 250, 0.95);
      }

      .frame {
        position: relative;
        min-height: 560px;
        border: 1px solid var(--rule);
        border-radius: 38px;
        overflow: hidden;
        background:
          linear-gradient(rgba(96, 165, 250, 0.07) 1px, transparent 1px),
          linear-gradient(90deg, rgba(96, 165, 250, 0.07) 1px, transparent 1px),
          linear-gradient(155deg, rgba(15, 23, 42, 0.82), rgba(2, 6, 23, 0.7));
        background-size:
          40px 40px,
          40px 40px,
          auto;
        box-shadow: 0 42px 100px -62px rgba(0, 0, 0, 0.9);
      }

      .halo {
        position: absolute;
        left: 50%;
        top: 47%;
        width: 380px;
        height: 380px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(96, 165, 250, 0.28), transparent 58%),
          conic-gradient(from 70deg, rgba(96, 165, 250, 0.42), transparent, rgba(245, 158, 11, 0.34), transparent);
        filter: blur(2px);
        transform: translate(-50%, -50%);
      }

      .scan {
        position: absolute;
        inset: 40px;
        border: 1px solid rgba(96, 165, 250, 0.24);
        border-radius: 32px;
      }

      .scan::before,
      .scan::after {
        position: absolute;
        width: 58px;
        height: 58px;
        content: "";
        border-color: var(--blue);
        opacity: 0.8;
      }

      .scan::before {
        left: -1px;
        top: -1px;
        border-top: 2px solid;
        border-left: 2px solid;
        border-radius: 28px 0 0 0;
      }

      .scan::after {
        right: -1px;
        bottom: -1px;
        border-right: 2px solid;
        border-bottom: 2px solid;
        border-radius: 0 0 28px 0;
      }

      .portrait {
        position: absolute;
        inset: 46px 42px 0;
        display: flex;
        align-items: flex-end;
        justify-content: center;
      }

      .portrait img {
        width: min(420px, 100%);
        max-height: 100%;
        object-fit: contain;
        object-position: bottom center;
        filter: drop-shadow(0 32px 36px rgba(0, 0, 0, 0.48)) drop-shadow(0 0 32px rgba(96, 165, 250, 0.22));
      }

      .tag {
        position: absolute;
        left: 32px;
        top: 32px;
        padding: 8px 13px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        color: var(--ink-2);
        background: rgba(15, 23, 42, 0.62);
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        backdrop-filter: blur(14px);
      }

      .metric {
        position: absolute;
        right: 32px;
        bottom: 32px;
        width: 180px;
        padding: 16px;
        border: 1px solid var(--rule);
        border-radius: 20px;
        color: var(--ink-2);
        background: rgba(15, 23, 42, 0.64);
        backdrop-filter: blur(14px);
        font-size: 13px;
        line-height: 1.5;
      }

      .metric strong {
        display: block;
        color: var(--ink);
        font-size: 28px;
        line-height: 1;
      }

      @media (max-width: 930px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero::before {
          display: none;
        }

        .frame {
          min-height: 540px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero" aria-labelledby="hero-heading">
      <div>
        <div class="kicker">Applied AI Lab</div>
        <h1 id="hero-heading">Building systems where <span>vision meets action.</span></h1>
        <p class="lede">
          Research, evaluation, and product-minded ML for the space between capable models and dependable imaging
          workflows.
        </p>
        <div class="actions">
          <a class="btn primary" href="/research">Explore Research</a>
          <a class="btn" href="/posts/">Read Notes</a>
          <a class="btn" href="mailto:m.molahasani.m@gmail.com">Get in Touch</a>
        </div>
      </div>

      <div class="frame" aria-label="Cinematic portrait concept">
        <div class="halo"></div>
        <div class="scan"></div>
        <div class="tag">Vancouver, BC</div>
        <div class="portrait">
          <img src="../images/profile.png" alt="Mahdiyar Molahasani" />
        </div>
        <div class="metric"><strong>8+</strong> years research across vision, generalization, and applied ML</div>
      </div>
    </section>
  </body>
</html>
